<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ali Youssef — Video Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c; --gold-dim: #9a7a34; --cream: #f0ece2;
    --ink: #0a0a0a; --mid: #1e1e1e; --muted: #555;
    --border: rgba(201,168,76,0.2);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--ink); color: var(--cream); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }
  .cursor { position: fixed; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s; }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid var(--gold); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s, opacity 0.3s; opacity: 0.5; }
  body.hovering .cursor { width: 6px; height: 6px; }
  body.hovering .cursor-ring { width: 54px; height: 54px; opacity: 0.9; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.4; }
  nav { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 3rem; z-index: 100; background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%); }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.15em; color: var(--cream); text-decoration: none; }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240,236,226,0.6); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--gold); }
  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 3rem 5rem; position: relative; overflow: hidden; }
  .hero-reel { position: absolute; inset: 0; z-index: 0; }
  .hero-reel iframe { width: 100%; height: 100%; border: none; pointer-events: none; transform: scale(1.05); }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.1) 40%, rgba(10,10,10,0.85) 100%); z-index: 1; }
  .hero-content { position: relative; z-index: 2; }
  .hero-eyebrow { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s 0.3s forwards; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 12vw, 11rem); line-height: 0.9; letter-spacing: 0.03em; color: var(--cream); opacity: 0; animation: fadeUp 0.9s 0.5s forwards; }
  .hero-title em { font-style: italic; font-family: 'Cormorant Garamond', serif; font-weight: 300; color: var(--gold); font-size: 0.85em; }
  .hero-sub { margin-top: 1.5rem; font-size: 0.85rem; letter-spacing: 0.12em; color: rgba(240,236,226,0.55); max-width: 380px; line-height: 1.8; opacity: 0; animation: fadeUp 0.9s 0.7s forwards; }
  .scroll-hint { position: absolute; bottom: 2.5rem; right: 3rem; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0; animation: fadeIn 1s 1.2s forwards; }
  .scroll-hint span { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(240,236,226,0.4); writing-mode: vertical-rl; }
  .scroll-line { width: 1px; height: 60px; background: linear-gradient(to bottom, var(--gold), transparent); animation: scrollPulse 2s infinite; }
  section { padding: 7rem 3rem; }
  .section-label { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; }
  .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 3.5rem; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: rgba(240,236,226,0.5); font-family: 'DM Sans', sans-serif; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.5rem 1.2rem; cursor: none; transition: all 0.3s; }
  .filter-btn:hover, .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }
  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
  .video-card { position: relative; background: var(--mid); overflow: hidden; cursor: none; }
  .video-card::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; z-index: 3; opacity: 0.06; }
  .video-card:hover::before { transform: scaleX(1); }
  .video-thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; }
  .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.75) saturate(0.8); transition: filter 0.5s, transform 0.6s ease; }
  .video-card:hover .video-thumb img { filter: brightness(0.5) saturate(0.6); transform: scale(1.04); }
  .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; opacity: 0; transition: opacity 0.3s; }
  .video-card:hover .play-btn { opacity: 1; }
  .play-icon { width: 56px; height: 56px; border: 1.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .play-icon svg { fill: var(--gold); margin-left: 4px; }
  .card-duration { position: absolute; bottom: 0.75rem; right: 0.75rem; font-size: 0.65rem; letter-spacing: 0.1em; background: rgba(10,10,10,0.85); color: var(--cream); padding: 0.25rem 0.5rem; z-index: 2; }
  .card-cat { position: absolute; top: 0.75rem; left: 0.75rem; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; background: var(--gold); color: var(--ink); padding: 0.2rem 0.6rem; z-index: 2; }
  .card-info { padding: 1.2rem 1.4rem 1.4rem; border-top: 1px solid var(--border); }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; color: var(--cream); margin-bottom: 0.35rem; letter-spacing: 0.02em; }
  .card-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.7; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(5,5,5,0.95); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal-inner { width: min(900px, 92vw); position: relative; }
  .modal-video { position: relative; aspect-ratio: 16/9; }
  .modal-video iframe { width: 100%; height: 100%; border: none; }
  .modal-close { position: absolute; top: -3rem; right: 0; background: none; border: none; color: var(--cream); font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; cursor: none; opacity: 0.6; transition: opacity 0.2s; font-family: 'DM Sans', sans-serif; }
  .modal-close:hover { opacity: 1; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-top: 1.2rem; color: var(--cream); letter-spacing: 0.04em; }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .about-heading { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; line-height: 1.15; letter-spacing: 0.02em; margin-bottom: 1.8rem; }
  .about-heading em { color: var(--gold); font-style: italic; }
  .about-text { font-size: 0.85rem; line-height: 2; color: rgba(240,236,226,0.65); margin-bottom: 1rem; }
  .tools-list { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 2rem; }
  .tool-tag { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; border: 1px solid var(--border); color: var(--gold); padding: 0.4rem 0.9rem; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240,236,226,0.4); margin-top: 0.3rem; }
  .divider { width: calc(100% - 6rem); height: 1px; background: var(--border); margin: 0 3rem; }
  .contact-section { padding: 7rem 3rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .contact-heading { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 7rem); letter-spacing: 0.06em; color: var(--cream); margin-bottom: 0.5rem; }
  .contact-heading span { color: var(--gold); }
  .contact-sub { font-size: 0.8rem; letter-spacing: 0.15em; color: rgba(240,236,226,0.4); margin-bottom: 3rem; text-transform: uppercase; }
  .contact-email { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--cream); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; transition: border-color 0.3s, color 0.3s; letter-spacing: 0.04em; }
  .contact-email:hover { color: var(--gold); border-color: var(--gold); }
  .socials { display: flex; gap: 2rem; margin-top: 2.5rem; }
  .socials a { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(240,236,226,0.4); text-decoration: none; transition: color 0.3s; }
  .socials a:hover { color: var(--gold); }
  footer { border-top: 1px solid var(--border); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; }
  footer p { font-size: 0.65rem; letter-spacing: 0.12em; color: rgba(240,236,226,0.25); text-transform: uppercase; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scrollPulse { 0%,100% { transform: scaleY(1); opacity: 1; } 50% { transform: scaleY(0.6); opacity: 0.4; } }
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal.visible { opacity: 1; transform: none; }
  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; } .nav-links { display: none; }
    .hero { padding: 0 1.5rem 4rem; } section { padding: 5rem 1.5rem; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    .contact-section { padding: 5rem 1.5rem; }
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<nav>
  <a class="nav-logo" href="#"><span id="navFirst">A</span><span id="navLast">Y</span></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-reel"><iframe id="heroReel" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow" id="heroTagline"></p>
    <h1 class="hero-title" id="heroName"></h1>
    <p class="hero-sub" id="heroSubtitle"></p>
  </div>
  <div class="scroll-hint"><div class="scroll-line"></div><span>Scroll</span></div>
</section>

<section id="work">
  <p class="section-label reveal">Selected Work</p>
  <div class="filter-bar reveal">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="commercial">Commercial</button>
    <button class="filter-btn" data-filter="documentary">Documentary</button>
    <button class="filter-btn" data-filter="music">Music Video</button>
    <button class="filter-btn" data-filter="narrative">Narrative</button>
  </div>
  <div class="video-grid" id="videoGrid"></div>
</section>

<div class="divider"></div>

<section id="about">
  <div class="about-grid">
    <div class="reveal">
      <p class="section-label">About</p>
      <h2 class="about-heading" id="aboutHeading"></h2>
      <p class="about-text" id="aboutBio1"></p>
      <p class="about-text" id="aboutBio2"></p>
      <div class="tools-list" id="toolsList"></div>
    </div>
    <div class="stat-grid reveal" id="statGrid"></div>
  </div>
</section>

<div class="divider"></div>

<section class="contact-section" id="contact">
  <p class="section-label reveal">Get in touch</p>
  <h2 class="contact-heading reveal">Let's <span>work</span><br>together</h2>
  <p class="contact-sub reveal">Available for freelance &amp; long-term collaborations</p>
  <a class="contact-email reveal" id="contactEmail" href="#"></a>
  <div class="socials reveal" id="socialsList"></div>
</section>

<footer>
  <p id="footerName"></p>
  <p id="footerLocation"></p>
</footer>

<div class="modal-backdrop" id="modal">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">✕ Close</button>
    <div class="modal-video"><iframe id="modalFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>
    <p class="modal-title" id="modalTitle"></p>
  </div>
</div>

<script>
  const REPO = 'houssein-hammoud/Ali-Youssef-Portfolio';
  const DATA_URL = `https://raw.githubusercontent.com/${REPO}/main/videos.json`;
  const catLabels = { commercial:'Commercial', documentary:'Documentary', music:'Music Video', narrative:'Narrative' };
  let allVideos = [], currentFilter = 'all';

  async function loadData() {
    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      const data = await res.json();
      renderSite(data);
    } catch(e) { console.error('Failed to load data:', e); }
  }

  function renderSite(d) {
    const parts = d.hero.name.split(' ');
    document.getElementById('navFirst').textContent = parts[0][0];
    document.getElementById('navLast').textContent = parts[1] ? parts[1][0] : '';
    document.getElementById('heroTagline').textContent = d.hero.tagline;
    document.getElementById('heroName').innerHTML = `${parts[0]}<br><em>${parts.slice(1).join(' ')}</em>`;
    document.getElementById('heroSubtitle').textContent = d.hero.subtitle;
    document.getElementById('heroReel').src = `https://www.youtube.com/embed/${d.hero.reelVideoId}?autoplay=1&mute=1&loop=1&playlist=${d.hero.reelVideoId}&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3`;
    document.getElementById('aboutHeading').innerHTML = d.about.heading.replace('edit.', '<em>edit.</em>');
    document.getElementById('aboutBio1').textContent = d.about.bio1;
    document.getElementById('aboutBio2').textContent = d.about.bio2;
    document.getElementById('toolsList').innerHTML = d.about.tools.map(t => `<span class="tool-tag">${t}</span>`).join('');
    document.getElementById('statGrid').innerHTML = d.about.stats.map(s => `<div><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
    const emailEl = document.getElementById('contactEmail');
    emailEl.textContent = d.contact.email; emailEl.href = `mailto:${d.contact.email}`;
    document.getElementById('socialsList').innerHTML = d.contact.socials.map(s => `<a href="${s.url}">${s.label}</a>`).join('');
    document.getElementById('footerName').textContent = `© ${new Date().getFullYear()} ${d.hero.name}. All rights reserved.`;
    document.getElementById('footerLocation').textContent = d.contact.location;
    allVideos = d.videos;
    renderGrid(currentFilter);
  }

  function renderGrid(filter) {
    const filtered = filter === 'all' ? allVideos : allVideos.filter(v => v.cat === filter);
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    filtered.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'video-card reveal';
      card.style.transitionDelay = `${i * 0.08}s`;
      card.innerHTML = `
        <div class="video-thumb">
          <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" alt="${v.title}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${v.id}/hqdefault.jpg'"/>
          <span class="card-cat">${catLabels[v.cat] || v.cat}</span>
          <span class="card-duration">${v.duration}</span>
          <div class="play-btn"><div class="play-icon"><svg width="14" height="16" viewBox="0 0 14 16"><polygon points="0,0 14,8 0,16"/></svg></div></div>
        </div>
        <div class="card-info"><h3 class="card-title">${v.title}</h3><p class="card-desc">${v.desc}</p></div>`;
      card.addEventListener('click', () => openModal(v));
      grid.appendChild(card);
    });
    observeReveal();
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid(currentFilter);
    });
  });

  const modal = document.getElementById('modal'), modalFrame = document.getElementById('modalFrame'), modalTitle = document.getElementById('modalTitle');
  function openModal(v) { modalFrame.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1`; modalTitle.textContent = v.title; modal.classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeModal() { modal.classList.remove('open'); modalFrame.src = ''; document.body.style.overflow = ''; }
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function observeReveal() {
    const io = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } }); }, { threshold: 0.1 });
    document.querySelectorAll('.reveal:not(.visible)').forEach(el => io.observe(el));
  }

  const cur = document.getElementById('cursor'), ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  (function anim(){ cur.style.left=mx+'px'; cur.style.top=my+'px'; rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(anim); })();
  document.querySelectorAll('a,button,.video-card,.filter-btn').forEach(el => { el.addEventListener('mouseenter',()=>document.body.classList.add('hovering')); el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering')); });

  loadData();
</script>
</body>
</html>
